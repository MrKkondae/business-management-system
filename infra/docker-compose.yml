services:
  postgres:
    image: postgres:16
    container_name: bms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bms}
      POSTGRES_USER: ${POSTGRES_USER:-bms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
