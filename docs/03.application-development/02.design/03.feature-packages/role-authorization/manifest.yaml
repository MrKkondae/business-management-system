    - 역할·권한 변경 시스템로그
  excludes:
    - 메뉴 기준정보 등록·수정·삭제와 순서 변경
    - 기능 행위별 CRUD 권한 분리
    - 조직·담당자·프로젝트별 데이터 범위 권한
    - 현재 로그인 세션의 권한 즉시 갱신

