    - 서버 세션 생성·조회·만료와 로그아웃
    - 중요 관리자 작업 전 현재 비밀번호 재인증
    - 로그인 시점 역할·메뉴권한 스냅샷 생성
    - 로그인 실패건수 증가와 6번째 실패 계정 비활성화
    - 로그인·로그아웃·자동 로그아웃 접속로그
    - 현재 사용자와 접근 가능 메뉴 조회
  excludes:
    - 사용자 기본정보 관리
    - 역할·메뉴권한 기준정보 관리
    - SSO와 외부 OAuth 인증
    - 비밀번호 찾기와 이메일·SMS 발송

