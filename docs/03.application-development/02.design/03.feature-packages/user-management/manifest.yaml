current_delivery_unit:
  id: USER-LIST-REGISTER-001
  includes:
    - 사용자 목록 조회
    - 등록 조직·역할 옵션 조회
    - 내부 직원·사용자·초기 역할 동시 등록
    - 24시간 유효한 최초 등록 전용 임시 비밀번호 1회 전달
  excludes:
    - 사용자 상세·수정·사용중지
    - 비밀번호 초기화·변경
    - 계정 활성·비활성
    - 최초 등록 완성 화면 구현
    - 최초 시스템관리자 부트스트랩 실행

scope:
  includes:
    - 사용자 목록·상세 조회와 등록·수정
    - 관리자가 직원 최소정보와 사용자 계정 초기값을 한 번에 직접 등록
    - 직원·사용자·초기 역할 관계의 단일 트랜잭션 생성
    - 사용자의 최초 로그인 비밀번호 변경과 선택 개인정보 완성
    - 빈 시스템의 기본 조직·최초 시스템관리자 1회성 부트스트랩
    - 사용자 사용중지와 계정 활성·비활성 처리
    - 관리자 비밀번호 초기화와 사용자 비밀번호 변경
    - 로그인 실패 비활성 해제와 실패건수 초기화
    - 사용자 변경 시스템로그와 개인정보 마스킹
  excludes:
    - 외주인력 사용자 계정 생성
    - 공개 회원가입과 관리자 승인 없는 사용자 생성
    - 사용자 등록에 필요한 최소 범위를 넘는 직원 상세정보 관리
    - 직원 엑셀 일괄등록
    - 역할 기준정보와 메뉴권한 관리
    - 로그인·로그아웃 세션 처리

