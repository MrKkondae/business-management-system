spring.application.name=backend

spring.config.import=optional:file:${user.home}/.bms/application-local.properties

server.servlet.context-path=/api/v1
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=BMSSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${BMS_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.forward-headers-strategy=none

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.hikari.maximum-pool-size=${BMS_DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${BMS_DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${BMS_DB_CONNECTION_TIMEOUT_MS:5000}
spring.datasource.hikari.validation-timeout=${BMS_DB_VALIDATION_TIMEOUT_MS:2000}
spring.datasource.hikari.idle-timeout=${BMS_DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${BMS_DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${BMS_DB_KEEPALIVE_TIME_MS:0}
spring.datasource.hikari.leak-detection-threshold=${BMS_DB_LEAK_DETECTION_THRESHOLD_MS:0}

mybatis.mapper-locations=classpath*:mybatis/mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

bms.security.login-id-hmac-key=${BMS_LOGIN_ID_HMAC_KEY:}

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
