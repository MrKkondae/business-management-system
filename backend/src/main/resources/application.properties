spring.application.name=backend

spring.config.import=optional:file:${user.home}/.bms/application-local.properties

server.servlet.context-path=/api/v1
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=BMSSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${BMS_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.forward-headers-strategy=none

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

bms.security.login-id-hmac-key=${BMS_LOGIN_ID_HMAC_KEY:}

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
